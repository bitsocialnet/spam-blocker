[agents]
max_threads = 8
max_depth = 1

[agents.plan-implementer]
description = "Implementation-focused agent for scoped backend tasks from a parent plan."
config_file = "agents/plan-implementer.toml"

[agents.code-quality]
description = "Verification agent that runs the repo's Yarn build, test, type-check, and formatting checks, then fixes only surfaced issues."
config_file = "agents/code-quality.toml"

[agents.browser-check]
description = "Read-only browser verification agent for local iframe and OAuth routes using playwright-cli."
config_file = "agents/browser-check.toml"

[agents.risk-score-keeper]
description = "Risk score maintenance agent for risk-factor changes, scenario regeneration, and related documentation."
config_file = "agents/risk-score-keeper.toml"
