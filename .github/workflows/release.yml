name: Release

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [master]

jobs:
    release:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm ci

            - run: npm run build

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Detect server changes
              id: server-changes
              run: |
                  LAST_TAG=$(git tag -l 'server-v*' --sort=-v:refname | head -n1)
                  if [ -z "$LAST_TAG" ]; then
                    echo "has_changes=true" >> "$GITHUB_OUTPUT"
                  else
                    CHANGES=$(git diff --name-only "$LAST_TAG"..HEAD -- packages/server/ packages/shared/)
                    if [ -n "$CHANGES" ]; then
                      echo "has_changes=true" >> "$GITHUB_OUTPUT"
                    else
                      echo "has_changes=false" >> "$GITHUB_OUTPUT"
                    fi
                  fi

            - name: Detect challenge changes
              id: challenge-changes
              run: |
                  LAST_TAG=$(git tag -l 'challenge-v*' --sort=-v:refname | head -n1)
                  if [ -z "$LAST_TAG" ]; then
                    echo "has_changes=true" >> "$GITHUB_OUTPUT"
                  else
                    CHANGES=$(git diff --name-only "$LAST_TAG"..HEAD -- packages/challenge/ packages/shared/)
                    if [ -n "$CHANGES" ]; then
                      echo "has_changes=true" >> "$GITHUB_OUTPUT"
                    else
                      echo "has_changes=false" >> "$GITHUB_OUTPUT"
                    fi
                  fi

            - name: Release server
              if: steps.server-changes.outputs.has_changes == 'true'
              working-directory: packages/server
              run: npx release-it --ci --config .release-it.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HUSKY: "0"

            - name: Pull rebase after server release
              if: steps.server-changes.outputs.has_changes == 'true'
              run: git pull --rebase

            - name: Release challenge
              if: steps.challenge-changes.outputs.has_changes == 'true'
              working-directory: packages/challenge
              run: npx release-it --ci --config .release-it.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  HUSKY: "0"
