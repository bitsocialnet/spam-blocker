name: Release

on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [master]

jobs:
    release:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        permissions:
            actions: write
            contents: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - run: corepack enable

            - run: corepack yarn install --immutable

            - run: corepack yarn build

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Detect challenge changes
              id: challenge-changes
              run: |
                  LAST_TAG=$(git tag -l 'challenge-v*' --sort=-v:refname | head -n1)
                  if [ -z "$LAST_TAG" ]; then
                    echo "has_changes=true" >> "$GITHUB_OUTPUT"
                  else
                    CHANGES=$(git diff --name-only "$LAST_TAG"..HEAD -- packages/challenge/ packages/shared/ | grep -v '^packages/challenge/CHANGELOG.md$' || true)
                    if [ -n "$CHANGES" ]; then
                      echo "has_changes=true" >> "$GITHUB_OUTPUT"
                    else
                      echo "has_changes=false" >> "$GITHUB_OUTPUT"
                    fi
                  fi

            - name: Release challenge
              if: steps.challenge-changes.outputs.has_changes == 'true'
              working-directory: packages/challenge
              run: |
                  RELEASE_IT=$(corepack yarn --cwd ../.. bin release-it)
                  "$RELEASE_IT" --ci --config .release-it.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HUSKY: "0"

            - name: Publish GitHub release
              if: steps.challenge-changes.outputs.has_changes == 'true'
              run: |
                  PACKAGE_VERSION=$(node -p "require('./packages/challenge/package.json').version")
                  gh release edit "challenge-v${PACKAGE_VERSION}" --draft=false --latest
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Dispatch npm publish
              if: steps.challenge-changes.outputs.has_changes == 'true'
              run: gh workflow run publish-challenge.yml --ref master
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
