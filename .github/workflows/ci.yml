name: CI

on:
    pull_request:
        branches: [master]
        paths:
            - "packages/**"
            - "package.json"
            - "package-lock.json"
            - ".github/**"
    push:
        branches: [master]
        paths:
            - "packages/**"
            - "package.json"
            - "package-lock.json"
            - ".github/**"

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            - run: npm run build

            - run: npm run -w @bitsocial/spam-blocker-server test

            - run: npm run -w @bitsocial/spam-blocker-challenge test

            - run: npm run format:check
